name: Tests

on:
  push:
    branches:
      - main
      - "refactor/**"
      - "feat/**"
      - "fix/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # HA loader breaks on 3.14; keep in lockstep with the local venv.
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements_test.txt "ruff==0.8.3"

      - name: Ruff
        run: |
          ruff check custom_components/ tests/
          ruff format --check custom_components/ tests/

      - name: Pytest
        run: python -m pytest tests/ -q
